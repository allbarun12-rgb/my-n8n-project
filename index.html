<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이종민코퍼레이션 - 통합 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --mint: #b2f2bb; --pink: #ffc9c9; --yellow: #fff3bf; --dark: #2d3436; }
        body { margin: 0; background: linear-gradient(135deg, var(--mint), var(--pink)); font-family: 'Pretendard', sans-serif; min-height: 100vh; padding: 40px; box-sizing: border-box; display: flex; justify-content: center; }
        
        /* 전체 화면을 넓게 쓰기 위한 컨테이너 */
        .main-container { width: 100%; max-width: 1400px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 5px solid white; border-radius: 50px; padding: 60px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 50px; }
        .logo { font-family: 'Black Han Sans', sans-serif; font-size: 4rem; color: var(--dark); text-shadow: 5px 5px 0px var(--yellow); margin: 0; }
        
        .section-wrapper { display: flex; flex-direction: column; gap: 50px; }
        
        /* 카드 내부를 좌우로 나누는 플렉스 박스 */
        .card { background: white; border: 5px solid var(--dark); border-radius: 40px; padding: 40px; box-shadow: 15px 15px 0px var(--dark); display: flex; gap: 40px; align-items: stretch; }
        
        /* 왼쪽: 입력 영역 */
        .input-side { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        
        /* 오른쪽: 결과 영역 */
        .result-side { flex: 1.2; }

        h2 { font-size: 2.2rem; margin-top: 0; margin-bottom: 10px; }
        .hint-text { color: #666; font-size: 1.2rem; margin-bottom: 25px; font-weight: bold; }
        
        input { width: 100%; padding: 22px; border: 4px solid #eee; border-radius: 25px; margin-bottom: 25px; font-size: 1.3rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--dark); outline: none; }
        
        .btn { width: 100%; border: 5px solid var(--dark); padding: 22px; border-radius: 60px; font-size: 1.6rem; font-weight: 900; cursor: pointer; box-shadow: 7px 7px 0px var(--dark); transition: 0.1s; }
        .btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--dark); }

        /* 결과창 스타일 - 사진처럼 점선 테두리 */
        .result-area { background: #fff; border: 4px dashed var(--mint); border-radius: 30px; height: 100%; min-height: 350px; padding: 30px; font-size: 1.2rem; color: #444; white-space: pre-wrap; box-sizing: border-box; }

        /* 반응형: 화면이 좁아지면 다시 위아래로 */
        @media (max-width: 1000px) {
            .card { flex-direction: column; }
            .result-area { min-height: 250px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1 class="logo">이종민코퍼레이션</h1>
            <p style="font-weight: bold; color: #555; font-size: 1.4rem; margin-top: 15px;">Smart AI Enterprise Dashboard</p>
        </div>

        <div class="section-wrapper">
            <div class="card">
                <div class="input-side">
                    <h2>📦 제품보고서 생성</h2>
                    <div class="hint-text">생성할 제품의 이름을 입력해주세요.</div>
                    <input type="text" id="product-name" placeholder="원하는 제품이름을 입력하세요">
                    <button class="btn" style="background: var(--yellow);" onclick="callN8n('product')">보고서 톡톡!</button>
                </div>
                <div class="result-side">
                    <div class="result-area" id="product-result">결과화면</div>
                </div>
            </div>

            <div class="card">
                <div class="input-side">
                    <h2>🎬 스토리 만들기</h2>
                    <div class="hint-text">어떤 상황의 스토리를 원하시나요?</div>
                    <input type="text" id="story-context" placeholder="원하는 상황을 입력하세요">
                    <button class="btn" style="background: var(--mint);" onclick="callN8n('story')">스토리 톡톡!</button>
                </div>
                <div class="result-side">
                    <div class="result-area" id="story-result">결과화면</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function callN8n(type) {
            const input = document.getElementById(type === 'product' ? 'product-name' : 'story-context').value;
            const resultBox = document.getElementById(type === 'product' ? 'product-result' : 'story-result');
            
            if(!input) return alert("내용을 입력해주세요!");
            resultBox.innerText = "AI가 작성 중입니다... 🚀";

            // 실제 n8n URL로 수정하여 사용하세요.
            const URL = 'https://allbarun7.app.n8n.cloud/webhook/your-id';

            try {
                const res = await fetch(`${URL}?type=${type}&query=${encodeURIComponent(input)}`);
                const data = await res.json();
                resultBox.innerText = data.output || JSON.stringify(data);
            } catch (e) {
                resultBox.innerText = "에러 발생: n8n 연결 상태를 확인하세요.";
            }
        }
    </script>
</body>
</html>
