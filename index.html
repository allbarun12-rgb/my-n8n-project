<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이종민코퍼레이션 - 통합 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --mint: #b2f2bb; --pink: #ffc9c9; --yellow: #fff3bf; --dark: #2d3436; }
        body { margin: 0; background: linear-gradient(135deg, var(--mint), var(--pink)); font-family: 'Pretendard', sans-serif; min-height: 100vh; padding: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: flex-start; }
        
        /* 메인 컨테이너 - 가로폭은 넉넉하게, 배치는 중앙 */
        .main-container { width: 100%; max-width: 800px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border: 5px solid white; border-radius: 50px; padding: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 40px; }
        .logo { font-family: 'Black Han Sans', sans-serif; font-size: 3.5rem; color: var(--dark); text-shadow: 4px 4px 0px var(--yellow); margin: 0; }
        
        /* 수직 배치를 위한 스타일 */
        .section-wrapper { display: flex; flex-direction: column; gap: 40px; }
        
        /* 개별 카드 스타일 - 보내주신 양식의 굵은 테두리 느낌 */
        .card { background: white; border: 4px solid var(--dark); border-radius: 40px; padding: 40px; box-shadow: 12px 12px 0px var(--dark); }
        
        h2 { font-size: 2rem; margin-top: 0; margin-bottom: 10px; display: flex; align-items: center; }
        .hint-text { color: #666; font-size: 1.1rem; margin-bottom: 20px; font-weight: bold; }
        
        input { width: 100%; padding: 20px; border: 3px solid #eee; border-radius: 20px; margin-bottom: 20px; font-size: 1.2rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--dark); outline: none; }
        
        .btn { width: 100%; border: 4px solid var(--dark); padding: 20px; border-radius: 60px; font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: 6px 6px 0px var(--dark); transition: 0.1s; }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px var(--dark); }

        /* 결과 영역 - 사진처럼 점선 테두리 적용 */
        .result-area { background: #fff; border: 3px dashed var(--mint); border-radius: 25px; min-height: 250px; margin-top: 30px; padding: 25px; font-size: 1.1rem; color: #444; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1 class="logo">이종민코퍼레이션</h1>
            <p style="font-weight: bold; color: #555; font-size: 1.2rem; margin-top: 10px;">Smart AI Dashboard</p>
        </div>

        <div class="section-wrapper">
            <div class="card">
                <h2>📦 제품보고서 생성</h2>
                <div class="hint-text">생성할 제품의 이름을 입력해주세요.</div>
                <input type="text" id="product-name" placeholder="원하는 제품이름을 입력하세요"> <button class="btn" style="background: var(--yellow);" onclick="callN8n('product')">보고서 톡톡!</button>
                <div class="result-area" id="product-result">결과화면</div> </div>

            <div class="card">
                <h2>🎬 스토리 만들기</h2>
                <div class="hint-text">어떤 상황의 스토리를 원하시나요?</div>
                <input type="text" id="story-context" placeholder="원하는 상황을 입력하세요"> <button class="btn" style="background: var(--mint);" onclick="callN8n('story')">스토리 톡톡!</button>
                <div class="result-area" id="story-result">결과화면</div> </div>
        </div>
    </div>

    <script>
        async function callN8n(type) {
            const input = document.getElementById(type === 'product' ? 'product-name' : 'story-context').value;
            const resultBox = document.getElementById(type === 'product' ? 'product-result' : 'story-result');
            
            if(!input) return alert("내용을 입력해주세요!");
            resultBox.innerText = "AI가 작성 중입니다... 🚀";

            // 실제 n8n URL로 수정해서 사용하세요!
            const URL = 'https://allbarun7.app.n8n.cloud/webhook/your-id';

            try {
                const res = await fetch(`${URL}?type=${type}&query=${encodeURIComponent(input)}`);
                const data = await res.json();
                resultBox.innerText = data.output || JSON.stringify(data);
            } catch (e) {
                resultBox.innerText = "에러가 발생했습니다. n8n의 CORS 설정을 확인하세요.";
            }
        }
    </script>
</body>
</html>
