<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이종민코퍼레이션 - 통합 스마트 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #b2f2bb;
            --pink: #ffc9c9;
            --yellow: #fff3bf;
            --dark: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            /* 배경 그라데이션 - 팝한 느낌 */
            background: linear-gradient(135deg, var(--mint), var(--pink));
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column; /* 세로 배치 */
            align-items: center;
            min-height: 100vh;
        }

        /* 메인 컨테이너 (유리창 느낌, 가로폭 확대) */
        .glass-container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 5px solid white;
            border-radius: 40px;
            padding: 40px;
            margin: 40px auto; /* 중앙 배치 및 상하 여백 */
            width: 90%; /* 화면 폭의 90% 사용 */
            max-width: 1200px; /* 최대 가로폭 제한 (너무 넓어지지 않게) */
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 로고 스타일 (틱톡 감성) */
        .logo {
            font-family: 'Black Han Sans', sans-serif;
            color: var(--dark);
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 4px 4px 0px var(--yellow);
        }

        .sub-logo {
            font-size: 1.1rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* 기능 섹션 레이아웃 (가로 배치) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2개 컬럼 */
            gap: 30px; /* 카드 간 여백 */
        }

        /* 공통 카드 스타일 (가로폭 확대에 맞춰 크기 조정) */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            border: 4px solid var(--dark);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 8px 8px 0px var(--dark);
            text-align: left; /* 텍스트 왼쪽 정렬 */
            transition: transform 0.2s;
        }

        .glass-card:hover {
            transform: translateY(-5px); /* 호버 시 살짝 들림 */
        }

        .glass-card h2 {
            font-size: 1.8rem;
            color: #333;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
        }

        /* 입력창 스타일 */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 3px solid #eee;
            border-radius: 15px;
            margin-bottom: 15px;
            box-sizing: border-box; /* 패딩 포함 크기 */
            font-size: 1.1rem;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--dark);
            outline: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        /* 틱톡 감성 팝 버튼 (카드폭에 맞게) */
        .pop-button {
            width: 100%;
            border: 4px solid var(--dark);
            padding: 15px 0;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--dark);
            cursor: pointer;
            box-shadow: 5px 5px 0px var(--dark);
            transition: 0.1s;
        }

        .pop-button:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px var(--dark);
        }

        /* 데이터 영역 (카드 내부, 가로폭 확대) */
        .data-area {
            background: white;
            border-radius: 20px;
            padding: 20px;
            min-height: 200px;
            margin-top: 20px;
            border: 3px dashed var(--mint);
            color: #555;
            white-space: pre-wrap; /* 줄바꿈 유지 */
            word-break: break-all; /* 긴 단어 줄바꿈 */
        }

        /* 반응형 설정 (화면이 좁아지면 세로로 배치) */
        @media (max-width: 800px) {
            .dashboard-grid {
                grid-template-columns: 1fr; /* 1개 컬럼으로 변경 */
            }
            .logo { font-size: 2.2rem; }
            .sub-logo { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="logo">이종민코퍼레이션</div>
        <div class="sub-logo">Smart AI 통합 대시보드 v1.0</div>
        
        <div class="dashboard-grid">
            
            <div class="glass-card">
                <h2>📦 제품보고서 생성</h2>
                <div style="margin-bottom: 10px; font-weight: bold; color: #555;">생성할 제품의 이름을 입력해주세요.</div>
                <input type="text" id="product-name" placeholder="예: 스마트 텀블러">
                <button class="pop-button" style="background: var(--yellow);" onclick="requestN8n('product')">보고서 톡톡!</button>
                <div id="product-result" class="data-area">결과화면</div>
            </div>

            <div class="glass-card">
                <h2>🎬 스토리 만들기</h2>
                <div style="margin-bottom: 10px; font-weight: bold; color: #555;">어떤 상황의 스토리를 원하시나요?</div>
                <input type="text" id="story-context" placeholder="예: 우주에서 온 편지">
                <button class="pop-button" style="background: var(--mint);" onclick="requestN8n('story')">스토리 톡톡!</button>
                <div id="story-result" class="data-area">결과화면</div>
            </div>

        </div>

    </div>

    <script>
        async function requestN8n(type) {
            const inputId = type === 'product' ? 'product-name' : 'story-context';
            const resultId = type === 'product' ? 'product-result' : 'story-result';
            const inputValue = document.getElementById(inputId).value;
            const resultBox = document.getElementById(resultId);

            if(!inputValue) {
                alert('내용을 입력해주세요!');
                return;
            }

            resultBox.innerText = "AI가 열심히 생각 중입니다...💭";

            // ⚠️ 주의: 본인의 n8n Webhook Production URL을 꼭 넣어주세요!
            const N8N_URL = 'https://allbarun7.app.n8n.cloud/webhook/your-id'; 

            try {
                // n8n으로 데이터를 보낼 때 'type'과 'value'를 같이 보냅니다.
                const response = await fetch(N8N_URL + `?type=${type}&query=${encodeURIComponent(inputValue)}`);
                
                if (!response.ok) throw new Error('연결 실패');
                const data = await response.json();
                
                // n8n 응답 데이터 표시 (n8n에서 { "output": "결과내용" } 형식으로 준다고 가정)
                resultBox.innerText = data.output || JSON.stringify(data);
                
            } catch (error) {
                resultBox.innerText = "❌ 연결 에러가 발생했습니다.\nn8n 설정을 확인해 주세요.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
